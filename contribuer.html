<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Frise verticale des années</title>
  <style>
    body {
      margin: 0;
      font-family: 'Arial', sans-serif;
      background-color: #fdfdf0;
    }

    .container {
      display: flex;
      height: 100vh;
    }

    .years-column {
      width: 120px;
      padding-left: 2rem;
      border-right: 1px solid #ddd;
      background: white;
      overflow-y: auto;
      max-height: 600px; /* Limite ≈ 15 années visibles */
    }

    .year {
      padding: 0.75rem 1rem;
      position: relative;
      cursor: pointer;
    }

    .year::before {
      content: "";
      position: absolute;
      left: -1rem;
      top: 50%;
      transform: translateY(-50%);
      width: 10px;
      height: 10px;
      background-color: #ccc;
      border-radius: 50%;
    }

    .year.active {
      font-weight: bold;
      font-size: 1.2rem;
      color: #007b7f; /* Couleur du bandeau */
    }

    .year.active::before {
      background-color: #007b7f;
      width: 12px;
      height: 12px;
    }

    .placeholder {
      flex: 1;
      padding: 2rem;
    }
  </style>
</head>
<body>

<div class="container">
  <div class="years-column" id="years">
    <div class="year" data-year="1800">1800</div>
    <div class="year" data-year="1801">1801</div>
    <div class="year" data-year="1802">1802</div>
    <div class="year" data-year="1803">1803</div>
    <div class="year" data-year="1804">1804</div>
    <div class="year active" data-year="1805">1805</div>
    <div class="year" data-year="1806">1806</div>
    <div class="year" data-year="1807">1807</div>
    <div class="year" data-year="1808">1808</div>
    <div class="year" data-year="1809">1809</div>
    <div class="year" data-year="1810">1810</div>
    <div class="year" data-year="1811">1811</div>
    <div class="year" data-year="1812">1812</div>
    <div class="year" data-year="1813">1813</div>
    <div class="year" data-year="1814">1814</div>
    <div class="year" data-year="1815">1815</div>
  </div>

  <div class="placeholder">
    <h2>Zone centrale</h2>
    <p>Ici s’afficheront les événements de l’année sélectionnée.</p>
  </div>
</div>

<script>
  document.addEventListener("DOMContentLoaded", function () {
    const years = document.querySelectorAll(".year");
    let selectedYear = document.querySelector(".year.active");

    years.forEach(year => {
      year.addEventListener("click", () => {
        if (selectedYear) {
          selectedYear.classList.remove("active");
        }
        year.classList.add("active");
        selectedYear = year;

        // Logique future : filtrer événements, charger fiche, etc.
        console.log("Année sélectionnée :", year.dataset.year);
      });
    });
  });
</script>

</body>
</html>
