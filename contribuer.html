<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Frise années dynamiques</title>
  <style>
    body {
      margin: 0;
      font-family: 'Arial', sans-serif;
    }

    .years-column {
      width: 120px;
      padding-left: 2rem;
      border-right: 1px solid #ddd;
      max-height: 600px; /* ≈ 15 années visibles */
      overflow-y: auto;
      background: white;
    }

    .year {
      padding: 0.75rem 1rem;
      cursor: pointer;
      position: relative;
    }

    .year::before {
      content: "";
      position: absolute;
      left: -1rem;
      top: 50%;
      transform: translateY(-50%);
      width: 10px;
      height: 10px;
      background-color: #ccc;
      border-radius: 50%;
    }

    .year.active {
      font-weight: bold;
      font-size: 1.2rem;
      color: #007b7f;
    }

    .year.active::before {
      background-color: #007b7f;
      width: 12px;
      height: 12px;
    }
  </style>
</head>
<body>

<div class="years-column">
  <div class="year" data-year="1800">1800</div>
  <div class="year" data-year="1801">1801</div>
  <div class="year" data-year="1802">1802</div>
  <div class="year" data-year="1803">1803</div>
  <div class="year active" data-year="1814">1814</div> <!-- Active -->
  <div class="year" data-year="1815">1815</div>
  <div class="year" data-year="1816">1816</div>
  <div class="year" data-year="1817">1817</div>
  <div class="year" data-year="1818">1818</div>
  <div class="year" data-year="1819">1819</div>
  <div class="year" data-year="1820">1820</div>
  <div class="year" data-year="1821">1821</div>
  <div class="year" data-year="1822">1822</div>
  <div class="year" data-year="1823">1823</div>
  <div class="year" data-year="1824">1824</div>
  <div class="year" data-year="1825">1825</div>
</div>

<script>
document.addEventListener("DOMContentLoaded", function() {
  const yearItems = document.querySelectorAll(".year");
  let selectedYear = document.querySelector(".year.active");

  yearItems.forEach(item => {
    item.addEventListener("click", () => {
      if (selectedYear) {
        selectedYear.classList.remove("active");
      }
      item.classList.add("active");
      selectedYear = item;
    });
  });
});
</script>

</body>
</html>
