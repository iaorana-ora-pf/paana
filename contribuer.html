
<script>
// ... inside showFiche:
document.getElementById("fiche-content").innerHTML = `
  ...
  <p><strong>🔖 Mots-clés :</strong> ${
    event.mots_cles?.map(mc =>
      `<a href="https://decs.bvsalud.org/fr/ths/?lang=fr&exact=true&desc=${encodeURIComponent(mc)}" target="_blank">${mc}</a>`
    ).join(', ') || '—'
  }</p>
  ...
`;

// ... inside createFilterUI:
function createFilterUI(type, containerId, values) {
  const container = document.getElementById(containerId);
  container.innerHTML = "";
  [...values].sort((a, b) => a.localeCompare(b, 'fr', { sensitivity: 'base' })).forEach(value => {
    const id = `${type}-${value.replace(/\s+/g, '_')}`;
    const link = type === "motscles"
      ? `<a href="https://decs.bvsalud.org/fr/ths/?lang=fr&exact=true&desc=${encodeURIComponent(value)}" target="_blank" title="Voir dans DeCS" style="margin-left: 6px;"><i class="fas fa-link"></i></a>`
      : "";
    const html = `<label><input type="checkbox" data-type="${type}" value="${value}" id="${id}"> ${value}${link}</label>`;
    container.insertAdjacentHTML('beforeend', html);
  });
}
</script>
