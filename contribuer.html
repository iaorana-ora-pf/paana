<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Frise Chronologique - Paana</title>
  <link href="https://unpkg.com/vis-timeline@latest/styles/vis-timeline-graph2d.min.css" rel="stylesheet" />
  <script src="https://unpkg.com/vis-timeline@latest/standalone/umd/vis-timeline-graph2d.min.js"></script>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      font-family: 'Arial', sans-serif;
      background-color: #fdfdf0;
      color: #050505;
      width: 100%;
    }
    body {
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }
    header {
      background-color: #007b7f;
      padding: 1.5rem 2rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      color: #fdfdf0;
    }
    .logo {
      font-size: 2rem;
      font-weight: bold;
    }
    nav a {
      text-decoration: none;
      margin-left: 1rem;
      background-color: #fdfdf0;
      color: #271923;
      padding: 0.5rem 1rem;
      border-radius: 20px;
      font-weight: bold;
    }
    main {
      flex-grow: 1;
      padding: 1rem 0;
    }
    #frise-container {
      width: 100%;
    }
    #timeline {
      width: 100vw;
      height: 500px;
      border: 1px solid #ccc;
    }
    footer {
      background-color: #eeeeee;
      text-align: center;
      padding: 1rem;
      font-size: 0.9rem;
      color: #606060;
    }

    /* Masquer les noms des groupes */
    .vis-labelset, .vis-group-label {
      display: none !important;
    }

    /* Exemple de coloration par thème */
    .vaccination { background-color: #2ecc71 !important; color: #fff; font-weight: bold; }
    .épidémie { background-color: #e74c3c !important; color: #fff; font-weight: bold; }
    .nutrition { background-color: #f39c12 !important; color: #fff; font-weight: bold; }
    .technologies-médicales { background-color: #3498db !important; color: #fff; font-weight: bold; }
    .éducation-à-la-santé { background-color: #9b59b6 !important; color: #fff; font-weight: bold; }
  </style>
</head>
<body>

  <header>
    <div class="logo">Paana</div>
    <nav>
      <a href="a-propos.html">A PROPOS</a>
      <a href="contribuer.html">CONTRIBUER</a>
    </nav>
  </header>

  <main>
    <section id="frise-container">
      <div id="timeline"></div>
    </section>
  </main>

  <footer>
    <p>2025 - Emmanuelle RUPP-TERRIS - <a href="mailto:frise.sante.pf@gmail.com">Contact</a></p>
  </footer>

  <script>
    fetch('evenements.json')
      .then(response => response.json())
      .then(events => {
        const items = new vis.DataSet(events.map(ev => ({
          id: ev.id,
          content: ev.titre,
          start: ev.annee_debut + '-01-01',
          end: ev.annee_fin !== ev.annee_debut ? ev.annee_fin + '-01-01' : null,
          group: ev.categorie_principale,
          className: ev.theme.replace(/\\s+/g, '-').toLowerCase()
        })));

        const groups = new vis.DataSet([...new Set(events.map(ev => ev.categorie_principale))].map(cat => ({
          id: cat,
          content: ""  // Masquer les labels de groupe
        })));

        const timeline = new vis.Timeline(document.getElementById('timeline'), items, groups, {
          zoomMin: 1000 * 60 * 60 * 24 * 365,
          zoomMax: 1000 * 60 * 60 * 24 * 365 * 50,
          start: '1800-01-01',
          end: '2025-12-31',
          format: {
            minorLabels: { year: 'YYYY' },
            majorLabels: { year: '' }
          }
        });
      });
  </script>

</body>
</html>
