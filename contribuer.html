<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contribuer - Paana</title>
  <meta name="description" content="Contribuer - Paana">
  <link href="https://unpkg.com/vis-timeline@latest/styles/vis-timeline-graph2d.min.css" rel="stylesheet" />
  <script src="https://unpkg.com/vis-timeline@latest/standalone/umd/vis-timeline-graph2d.min.js"></script>
  <style>
    body {
      margin: 0;
      font-family: 'League Spartan', sans-serif;
      background-color: #fdfdf0;
      color: #050505;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }
    header {
      background-color: #007b7f;
      padding: 1.5rem 2rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      color: #fdfdf0;
    }
    .logo {
      font-size: 2rem;
      font-weight: bold;
      color: #fdfdf0;
      position: relative;
    }
    .logo::after {
      content: "";
      display: block;
      height: 12px;
      background-color: #fee58c;
      margin-top: 10px;
    }
    nav {
      display: flex;
      gap: 1rem;
      flex-wrap: wrap;
    }
    nav a {
      text-decoration: none;
      background-color: #fdfdf0;
      color: #271923;
      padding: 0.6rem 1.2rem;
      border-radius: 25px;
      font-weight: bold;
      transition: all 0.3s ease-in-out;
    }
    nav a:hover,
    nav a.active {
      background-color: #fee58c;
      transform: scale(1.05);
    }
    main {
      flex-grow: 1;
      max-width: 1200px;
      margin: 0 auto;
      padding: 1.5rem 2rem 2rem 2rem;
      background-color: #fdfdf0;
      color: #050505;
    }
    p {
      font-size: 1rem;
      line-height: 1.7;
      margin-bottom: 1rem;
      color: #050505;
    }
    footer, footer * {
      background-color: #eeeeee;
      text-align: center;
      padding: 1rem;
      font-size: 0.9rem;
      color: #606060;
    }
    footer a {
      color: #606060;
      text-decoration: underline;
    }
#frise-container {
  display: flex;
  justify-content: center;
  margin-top: 2rem;
  width: 100%;
}

#timeline {
  flex-grow: 1;
  width: 100%;
  height: 500px;
  border: 1px solid #ccc;
}
    @media (max-width: 600px) {
      header {
        flex-direction: column;
        align-items: flex-start;
      }
      nav {
        width: 100%;
        justify-content: flex-start;
        margin-top: 1rem;
      }
    }
  </style>
</head>
<body>

  <header>
    <div class="logo">Paana</div>
    <nav>
      <a href="a-propos.html">A PROPOS</a>
      <a href="contribuer.html">CONTRIBUER</a>
      <a href="https://forms.gle/PR8ZHvSXxLNYETtx9" class="btn" target="_blank">SOUMETTRE</a>
    </nav>
  </header>

  <main>
    <h1>Nouvelle page</h1>

    <section id="frise-container">
      <div id="timeline"></div>
    </section>
  </main>

  <footer>
    <p>2025 - Emmanuelle RUPP-TERRIS - <a href="mailto:frise.sante.pf@gmail.com">Contact</a></p>
  </footer>

  <script>
    fetch('evenements.json')
      .then(response => response.json())
      .then(events => {
        const items = new vis.DataSet(events.map(ev => ({
          id: ev.id,
          content: ev.titre,
          start: ev.annee_debut + '-01-01',
          end: ev.annee_fin !== ev.annee_debut ? ev.annee_fin + '-01-01' : null,
          group: ev.categorie_principale,
          className: ev.theme.replace(/\\s+/g, '-').toLowerCase()
        })));

        const groups = new vis.DataSet([...new Set(events.map(ev => ev.categorie_principale))].map(cat => ({
          id: cat,
          content: cat
        })));

        const timeline = new vis.Timeline(document.getElementById('timeline'), items, groups, {
          zoomMin: 1000 * 60 * 60 * 24 * 365 * 1,
          zoomMax: 1000 * 60 * 60 * 24 * 365 * 50,
          start: '1800-01-01',
          end: '2025-12-31'
        });
      });
  </script>

</body>
</html>
