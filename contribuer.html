<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contribuer - Paana</title>
  <meta name="description" content="Paana - Base de connaissances sur la santé publique en Polynésie française">
  <link rel="stylesheet" href="header-footer.css" />
  <style>
    /* === BASE === */
    body {
      margin: 0;
      font-family: 'League Spartan', sans-serif;
      background-color: #fdfdf0;
      color: #050505;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    /* === MAIN CONTENT === */
    main {
      flex-grow: 1;
      max-width: 1200px;
      margin: 0 auto;
      padding: 1.5rem 2rem 2rem 2rem;
      background-color: #fdfdf0;
      color: #050505;
    }

    main h2:first-of-type {
      margin-top: 0.5rem;
    }

    h1 {
      font-size: 1.8rem;
      font-weight: bold;
      margin-bottom: 2rem;
    }

    h2 {
      color: #007b7f;
      font-weight: bold;
      margin-top: 2rem;
    }

    p {
      font-size: 1rem;
      line-height: 1.7;
      margin-bottom: 1rem;
      color: #050505;
    }

    main ul li {
      font-size: 1rem;
      line-height: 1.7;
      margin-bottom: 0;
      color: #050505;
    }

 /* 🧱 Mise en page 3 colonnes */
.three-column-layout {
  display: flex;
  flex-direction: row;
  gap: 1.5rem;
  align-items: flex-start;
}

#col-annees, #col-evenements, #col-fiche {
  flex: 1;
  padding: 1rem;
  background-color: #f5f5f5;
  border: 1px solid #ddd;
  min-height: 400px;
}

#col-annees {
  max-width: 120px;
  overflow-y: auto;
}

#col-evenements {
  flex: 2;
}

#col-fiche {
  flex: 2;
}

/* 🧭 Responsive mobile */
@media (max-width: 768px) {
  .three-column-layout {
    flex-direction: column;
  }

  #col-annees, #col-evenements, #col-fiche {
    max-width: 100%;
  }
}
  </style>

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />

</head>
<body>

  <header>
  <div class="logo">
  <span class="brand">Paana</span>

</div>
  <nav>

      <i class="fas fa-envelope fa-lg"></i>
    </a>
  </nav>
</header>

  <main>
<div id="frise-layout" class="three-column-layout">
  <aside id="col-annees">
    <h3>Années</h3>
    <div id="liste-annees"></div>
  </aside>
  <section id="col-evenements">
    <h3>Événements</h3>
    <div id="liste-evenements"></div>
  </section>
  <aside id="col-fiche">
    <h3>Détails</h3>
    <div id="fiche-details">Sélectionnez un événement pour voir les détails.</div>
  </aside>
</div>
  </main>
