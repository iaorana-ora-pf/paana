<!-- 🎯 Frise chronologique Paana - corrigée -->
<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Frise - Paana</title>
  <meta name="description" content="Frise chronologique - Paana">
  <link rel="stylesheet" href="header-footer.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <link href="https://unpkg.com/vis-timeline@latest/styles/vis-timeline-graph2d.min.css" rel="stylesheet" />
  <script src="https://unpkg.com/vis-timeline@latest/standalone/umd/vis-timeline-graph2d.min.js"></script>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      font-family: 'Arial', sans-serif;
      background-color: #fdfdf0;
      color: #050505;
      width: 100%;
    }
    main {
      padding: 3rem;
    }

    
    #frise-layout {
      display: flex;
      flex-direction: row;
      gap: 1rem;
    }
    #timeline {
      flex: 2;
      height: 400px;
      border: 1px solid #ccc;
    }
    #fiche {
      flex: 1;
      background-color: #f7f7f7;
      padding: 1rem;
      border-left: 2px solid #ccc;
      overflow-y: auto;
      font-size: 0.95rem;
    }
    #fiche h2 {
      margin-top: 0;
      font-size: 1.2rem;
      color: #007b7f;
    }
    #fiche-content {
      margin-top: 1rem;
    }
    #fiche-controls {
      display: flex;
      justify-content: space-between;
      margin: 1rem 0;
    }
    #fiche-controls button {
      padding: 0.5rem 1rem;
      background-color: #007b7f;
      color: #fff;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }
    #fiche-controls button:hover {
      background-color: #005f61;
    }
    #fiche-theme-list {
      margin-top: 1rem;
      font-size: 0.9rem;
      line-height: 1.6;
    }
    #fiche-theme-list span {
      display: block;
      padding: 4px 6px;
      cursor: pointer;
    }
    #fiche-theme-list span:hover {
      background-color: #e0e0e0;
    }
    #fiche-theme-list span.active {
      font-weight: bold;
      background-color: transparent;
    }
    .vis-labelset, .vis-group-label {
      display: none !important;
    }
  </style>
</head>
<body>

<header>
  <div class="logo">
    <span class="brand">Paana</span>
    <div class="trait"></div>
    <div class="signature">Emmanuelle RUPP-TERRIS</div>
  </div>
  <nav>
    <a href="a-propos.html">A PROPOS</a>
    <a href="contribuer.html">CONTRIBUER</a>
    <a href="https://forms.gle/PR8ZHvSXxLNYETtx9" target="_blank">SOUMETTRE</a>
    <a href="mailto:frise.sante.pf@gmail.com"><i class="fas fa-envelope fa-lg"></i></a>
  </nav>
</header>

<main>
  <div id="frise-layout">
    <div id="timeline"></div>
    <aside id="fiche">
      <h2 id="fiche-titre">Détails de l’événement</h2>
      <div id="fiche-content">Cliquez sur un événement pour voir les détails.</div>
      <div id="fiche-theme-list"></div>
      <div id="fiche-controls" style="display: none;">
        <button id="prevBtn">⬅️ Précédent</button>
        <button id="nextBtn">Suivant ➡️</button>
      </div>
    </aside>
  </div>
</main>

<script>
  let currentThemeEvents = [];
  let currentIndex = -1;
  let timeline;
  let events = [];

  function generateThemeColors(themes) {
    const style = document.createElement("style");
    document.head.appendChild(style);
    themes.forEach((theme, index) => {
      const className = theme.replace(/\s+/g, '-').toLowerCase();
      const hue = (index * 137.5) % 360;
      style.sheet.insertRule(`
        .${className} {
          background-color: hsl(${hue}, 70%, 60%) !important;
          color: white !important;
          font-weight: bold;
        }
      `, style.sheet.cssRules.length);
    });
  }

  function showFiche(eventId) {
    const event = events.find(e => e.id == eventId);
    if (!event) return;

    currentThemeEvents = events.filter(e => e.theme === event.theme);
    currentIndex = currentThemeEvents.findIndex(e => e.id == eventId);

    document.getElementById("fiche-titre").textContent = event.titre;
    document.getElementById("fiche-content").innerHTML = `
      <p><strong>📅 Année(s) :</strong> ${event.annee_debut} - ${event.annee_fin}</p>
      <p><strong>🗂️ Catégorie principale :</strong> ${event.categorie_principale}</p>
      <p><strong>🗃️ Catégorie secondaire :</strong> ${event.categorie_secondaire || '—'}</p>
      <p><strong>🎨 Thème :</strong> ${event.theme}</p>
      <p><strong>🔖 Mots-clés :</strong> ${event.mots_cles?.join(', ') || '—'}</p>
      <p><strong>📝 Description :</strong> ${event.description}</p>
      <p><strong>🔗 Source(s) :</strong> ${event.sources?.join(', ') || '—'}</p>
      <p><strong>📚 Pour aller plus loin :</strong> <a href="${event.en_savoir_plus}" target="_blank">Lien</a></p>
    `;

    document.getElementById("fiche-theme-list").innerHTML = `
      <strong>📂 Autres événements du même thème :</strong><br>
      ${currentThemeEvents.map(ev => `
        <span data-id="${ev.id}" class="${ev.id == event.id ? 'active' : ''}">${ev.titre}</span>
      `).join('')}
    `;

    document.getElementById("fiche-controls").style.display = "flex";

    // ✅ Changer de sélection SANS zoomer
   timeline.setSelection([eventId], {focus: false});
timeline.moveTo(new Date(event.annee_debut + '-01-01'), {animation: true});
  }

  fetch('evenements.json')
    .then(response => response.json())
    .then(data => {
      events = data;

      

function updateFilterVisibility() {
  const checked = {
    categories: [],
    themes: [],
    motscles: []
  };

  document.querySelectorAll('#filtres-container input[type="checkbox"]:checked').forEach(cb => {
    checked[cb.dataset.type].push(cb.value);
  });

  const activeGroups = Object.entries(checked).filter(([_, arr]) => arr.length > 0);

  if (activeGroups.length === 1) {
    const [activeGroup, selectedValues] = activeGroups[0];

    const matchedEvents = new Set();
    events.forEach(ev => {
      let match = false;
      if (activeGroup === 'categories') {
        match = selectedValues.includes(ev.categorie_principale) || selectedValues.includes(ev.categorie_secondaire);
      } else if (activeGroup === 'themes') {
        match = selectedValues.includes(ev.theme);
      } else if (activeGroup === 'motscles') {
        match = (ev.mots_cles || []).some(mc => selectedValues.includes(mc));
      }
      if (match) matchedEvents.add(ev);
    });

    const available = {
      categories: new Set(),
      themes: new Set(),
      motscles: new Set()
    };

    matchedEvents.forEach(ev => {
      [ev.categorie_principale, ev.categorie_secondaire].forEach(cat => cat && available.categories.add(cat));
      ev.theme && available.themes.add(ev.theme);
      (ev.mots_cles || []).forEach(mc => available.motscles.add(mc));
    });

    document.querySelectorAll('#filtres-container input[type="checkbox"]').forEach(cb => {
      const val = cb.value;
      const type = cb.dataset.type;
      const label = cb.parentElement;

      if (type === activeGroup) {
        label.classList.remove('filtre-desactive');
      } else {
        if (available[type].has(val)) {
          label.classList.remove('filtre-desactive');
        } else {
          label.classList.add('filtre-desactive');
        }
      }
    });
  } else {
    document.querySelectorAll('#filtres-container label').forEach(label => label.classList.remove('filtre-desactive'));
  }
}

document.getElementById("filtres-container").addEventListener("change", updateFilterVisibility);

const themes = [...new Set(events.map(ev => ev.theme))];
      generateThemeColors(themes);

      const items = new vis.DataSet(events.map(ev => ({
        id: ev.id,
        content: ev.titre,
        title: ev.titre,
        start: ev.annee_debut + '-01-01',
        end: ev.annee_fin !== ev.annee_debut ? ev.annee_fin + '-01-01' : null,
        group: ev.categorie_principale,
        className: ev.theme.replace(/\s+/g, '-').toLowerCase()
      })));

      const groups = new vis.DataSet([...new Set(events.map(ev => ev.categorie_principale))].map(cat => ({
        id: cat,
        content: ""
      })));

      timeline = new vis.Timeline(document.getElementById('timeline'), items, groups, {
        zoomMin: 1000 * 60 * 60 * 24 * 365,
        zoomMax: 1000 * 60 * 60 * 24 * 365 * 150,
        start: '1700-01-01',
        end: '2035-01-01',
        format: {
          minorLabels: { year: 'YYYY' },
          majorLabels: { year: '' }
        }
      });

      timeline.on('select', (props) => {
        if (props.items.length > 0) {
          showFiche(props.items[0]);
        }
      });

      document.getElementById("prevBtn").addEventListener("click", () => {
        if (currentIndex > 0) {
          showFiche(currentThemeEvents[currentIndex - 1].id);
        }
      });

      document.getElementById("nextBtn").addEventListener("click", () => {
        if (currentIndex < currentThemeEvents.length - 1) {
          showFiche(currentThemeEvents[currentIndex + 1].id);
        }
      });

      document.getElementById("fiche-theme-list").addEventListener("click", e => {
        if (e.target.dataset.id) {
          showFiche(e.target.dataset.id);
        }
      });
    });
</script>
</body>
</html>
