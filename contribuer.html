<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Frise - Paana</title>
  <meta name="description" content="Frise chronologique - Paana">
  <link rel="stylesheet" href="header-footer.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <link href="https://unpkg.com/vis-timeline@latest/styles/vis-timeline-graph2d.min.css" rel="stylesheet" />
  <script src="https://unpkg.com/vis-timeline@latest/standalone/umd/vis-timeline-graph2d.min.js"></script>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      font-family: 'Arial', sans-serif;
      background-color: #fdfdf0;
      color: #050505;
    }

    main {
      padding: 1rem;
    }

    #frise-layout {
      display: flex;
      flex-direction: row;
      gap: 1rem;
    }

    #timeline {
      flex: 2;
      height: 300px;
      border: 1px solid #ccc;
    }

    #fiche {
      flex: 1;
      background-color: #f7f7f7;
      padding: 1rem;
      border-left: 2px solid #ccc;
      overflow-y: auto;
      font-size: 0.95rem;
    }

    #fiche h2 {
      margin-top: 0;
      font-size: 1.2rem;
      color: #007b7f;
    }

    #fiche-content {
      margin-top: 1rem;
    }

    #fiche-controls {
      display: flex;
      justify-content: space-between;
      margin-top: 1rem;
    }

    #fiche-controls button {
      padding: 0.5rem 1rem;
      background-color: #007b7f;
      color: #fff;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }

    #fiche-controls button:hover {
      background-color: #005f61;
    }

    #fiche-theme-list {
      margin-top: 1rem;
      display: flex;
      flex-direction: column;
      gap: 0.3rem;
    }

    #fiche-theme-list span {
      display: block;
      padding: 4px 6px;
      cursor: pointer;
      transition: background-color 0.2s ease;
    }

    #fiche-theme-list span.active {
      font-weight: bold;
      background-color: #fee58c;
      border-radius: 3px;
    }

    #fiche-theme-list span:hover {
      background-color: #d9f0f0;
    }

    .vis-labelset, .vis-group-label {
      display: none !important;
    }
  </style>
</head>
<body>
  <header>
    <div class="logo">
      <span class="brand">Paana</span>
      <div class="trait"></div>
      <div class="signature">Emmanuelle RUPP-TERRIS</div>
    </div>
    <nav>
      <a href="a-propos.html">A PROPOS</a>
      <a href="contribuer.html">CONTRIBUER</a>
      <a href="https://forms.gle/PR8ZHvSXxLNYETtx9" target="_blank">SOUMETTRE</a>
      <a href="mailto:frise.sante.pf@gmail.com" title="Contacter par mail">
        <i class="fas fa-envelope fa-lg"></i>
      </a>
    </nav>
  </header>

  <main>
    <div id="frise-layout">
      <div id="timeline"></div>
      <aside id="fiche">
        <h2>Détails de l’événement</h2>
        <div id="fiche-content">Cliquez sur un événement pour voir les détails.</div>
        <div id="fiche-theme-list"></div>
        <div id="fiche-controls" style="display: none;">
          <button id="prevBtn">⬅️ Précédent</button>
          <button id="nextBtn">Suivant ➡️</button>
        </div>
      </aside>
    </div>
  </main>

  <script>
    let currentThemeEvents = [];
    let currentIndex = -1;

    fetch('evenements.json')
      .then(response => response.json())
      .then(events => {
        const items = new vis.DataSet(events.map(ev => ({
          id: ev.id,
          content: ev.titre,
          start: ev.annee_debut + '-01-01',
          end: ev.annee_fin !== ev.annee_debut ? ev.annee_fin + '-01-01' : null,
          group: ev.categorie_principale,
          className: ev.theme.replace(/\\s+/g, '-').toLowerCase()
        })));

        const groups = new vis.DataSet([...new Set(events.map(ev => ev.categorie_principale))].map(cat => ({
          id: cat,
          content: ""
        })));

        const timeline = new vis.Timeline(document.getElementById('timeline'), items, groups, {
          zoomMin: 1000 * 60 * 60 * 24 * 365,
          zoomMax: 1000 * 60 * 60 * 24 * 365 * 50,
          start: '1800-01-01',
          end: '2025-12-31',
          format: {
            minorLabels: { year: 'YYYY' },
            majorLabels: { year: '' }
          }
        });

        function showFiche(eventId) {
          const event = events.find(e => e.id == eventId);
          if (!event) return;

          currentThemeEvents = events.filter(e => e.theme === event.theme);
          currentIndex = currentThemeEvents.findIndex(e => e.id == eventId);

          const listHTML = currentThemeEvents.map(ev => `
            <span data-id="${ev.id}" class="${ev.id == event.id ? 'active' : ''}">${ev.titre}</span>
          `).join('');
          document.getElementById('fiche-theme-list').innerHTML = listHTML;

          document.getElementById('fiche-content').innerHTML = `
            <p><strong>🏷️ Titre :</strong> ${event.titre}</p>
            <p><strong>📅 Année(s) :</strong> ${event.annee_debut} - ${event.annee_fin}</p>
            <p><strong>🗂️ Catégorie principale :</strong> ${event.categorie_principale}</p>
            <p><strong>🗃️ Catégorie secondaire :</strong> ${event.categorie_secondaire || '—'}</p>
            <p><strong>🎨 Thème :</strong> ${event.theme}</p>
            <p><strong>🔖 Mots-clés :</strong> ${event.mots_cles?.join(', ') || '—'}</p>
            <p><strong>📝 Description :</strong> ${event.description}</p>
            <p><strong>🔗 Source(s) :</strong> ${event.sources?.join(', ') || '—'}</p>
            <p><strong>📚 Pour aller plus loin :</strong> <a href="${event.en_savoir_plus}" target="_blank">Lien</a></p>
          `;

          document.getElementById('fiche-controls').style.display = 'flex';
        }

        timeline.on('select', function (properties) {
          const selectedId = properties.items[0];
          showFiche(selectedId);
        });

        document.getElementById('prevBtn').addEventListener('click', () => {
          if (currentIndex > 0) {
            const prevId = currentThemeEvents[currentIndex - 1].id;
            showFiche(prevId);
          }
        });

        document.getElementById('nextBtn').addEventListener('click', () => {
          if (currentIndex < currentThemeEvents.length - 1) {
            const nextId = currentThemeEvents[currentIndex + 1].id;
            showFiche(nextId);
          }
        });

        document.getElementById('fiche-theme-list').addEventListener('click', (e) => {
          if (e.target.dataset.id) {
            showFiche(e.target.dataset.id);
          }
        });
      });
  </script>
</body>
</html>
